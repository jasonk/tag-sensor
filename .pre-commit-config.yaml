- repo: https://github.com/astral-sh/ruff-pre-commit
  # ruff version.
  rev: v0.8.4
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  # uv version.
  rev: 0.5.13
  hooks:
    - id: uv-lock
