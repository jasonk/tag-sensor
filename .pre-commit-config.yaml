repos:
- repo: https://github.com/PyCQA/bandit
  rev: 1.6.2
  hooks:
    - id: bandit
      args:
        - --quiet
        - --format=custom
        - --configfile=tests/bandit.yaml
      files: ^(src|script|tests)/.+\.py$
